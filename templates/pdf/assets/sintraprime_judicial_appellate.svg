<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Judicial Sigil: Appellate Tone Preset -->
  <!-- Double ring, medium bottom gap (~60px), heavy ring (16px) -->
  <g transform="translate(256,256)">
    <!-- Outer ring (with bottom gap) -->
    <path d="M 0,-220 A 220,220 0 1,1 -30,215" fill="none" stroke="#1a1a1a" stroke-width="16" stroke-linecap="butt"/>
    <path d="M 30,215 A 220,220 0 0,1 0,-220" fill="none" stroke="#1a1a1a" stroke-width="16" stroke-linecap="butt"/>
    <!-- Inner ring (with bottom gap) -->
    <path d="M 0,-180 A 180,180 0 1,1 -24,176" fill="none" stroke="#1a1a1a" stroke-width="12" stroke-linecap="butt"/>
    <path d="M 24,176 A 180,180 0 0,1 0,-180" fill="none" stroke="#1a1a1a" stroke-width="12" stroke-linecap="butt"/>
  </g>
</svg>
