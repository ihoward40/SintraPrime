name: AI review pack

on:
  pull_request:
    types: [opened, edited, reopened, synchronize]

permissions:
  contents: read
  pull-requests: write

jobs:
  validate-pr-body:
    name: Validate PR template fields
    runs-on: ubuntu-latest

    steps:
      - name: Post AI review pack comment
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            if (!pr) {
              core.setFailed('No pull_request found in event payload.');
              return;
            }

            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const pull_number = pr.number;
            const baseRef = pr.base?.ref;

            const marker = '<!-- ai-review-pack -->';
            const checklistUrl = baseRef
              ? `https://github.com/${owner}/${repo}/blob/${baseRef}/.github/review_checklist.md`
              : `https://github.com/${owner}/${repo}/blob/HEAD/.github/review_checklist.md`;

            const reviewBody = [
              marker,
              '## AI Review Pack',
              '',
              `- Reviewer checklist: ${checklistUrl}`,
              '- Ensure PR body includes: Summary, Changes, Testing, Risk, Checklist',
              '- Merge checklist: checks green → 1 approval → squash merge (recommended)',
              '',
              'This comment is automatically kept up to date.'
            ].join('\n');

            const reviews = await github.paginate(
              github.rest.pulls.listReviews,
              { owner, repo, pull_number, per_page: 100 }
            );

            const prior = reviews.find(r =>
              r.user?.login === 'github-actions[bot]' &&
              typeof r.body === 'string' &&
              r.body.includes(marker)
            );

            if (prior) {
              core.info('AI review pack review already exists; skipping.');
              return;
            }

            await github.rest.pulls.createReview({
              owner,
              repo,
              pull_number,
              body: reviewBody,
              event: 'COMMENT',
            });

            core.info('Posted AI review pack review comment.');

      - name: Validate required sections
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            if (!pr) {
              core.setFailed('No pull_request found in event payload.');
              return;
            }

            const body = (pr.body || '').trim();
            const requiredHeadings = [
              '## Summary',
              '## Changes',
              '## Testing',
              '## Risk',
              '## Checklist',
            ];

            const missing = requiredHeadings.filter(h => !body.includes(h));
            if (missing.length) {
              core.setFailed(`PR description is missing required section(s): ${missing.join(', ')}`);
              return;
            }

            function extractSection(heading) {
              const idx = body.indexOf(heading);
              if (idx < 0) return '';
              const after = body.slice(idx + heading.length);
              const nextIdx = after.search(/\n##\s+/);
              const section = nextIdx >= 0 ? after.slice(0, nextIdx) : after;
              return section.trim();
            }

            const testing = extractSection('## Testing');
            const risk = extractSection('## Risk');

            if (!testing || testing.toLowerCase() === 'n/a') {
              core.setFailed('Testing section must be filled in (or use "N/A" with an explanation).');
              return;
            }

            if (!risk || risk.toLowerCase() === 'n/a') {
              core.setFailed('Risk section must be filled in (or use "N/A" with an explanation).');
              return;
            }

            core.info('PR body contains required sections.');
