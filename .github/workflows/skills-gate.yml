name: Skills Gate

on:
  pull_request:
    paths:
      - 'skills.lock.json'
      - 'artifacts/skills/**'
      - 'scripts/skills-*.mjs'
  push:
    branches: [main, master]
    paths:
      - 'skills.lock.json'
      - 'artifacts/skills/**'
      - 'scripts/skills-*.mjs'

jobs:
  gate:
    if: github.event_name == 'pull_request' || github.event_name == 'pull_request_target'
    name: Verify Skills Governance
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Check No Revoked Skills Referenced
        run: npm run skills:check
