name: agent-ci

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  agent_orchestrator_smoke:
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Interface docs sync
        run: npm run -s agent:check:docsync

      - name: Interface deprecation deadlines
        run: npm run -s agent:check:deprecations

      - name: Assert deprecation rollup exists
        run: node -e "require('fs').accessSync('artifacts/deprecation-rollup.json')"

      - name: Upload deprecation rollup
        uses: actions/upload-artifact@v4
        with:
          name: deprecation-rollup-${{ matrix.os }}
          path: artifacts/deprecation-rollup.json
          if-no-files-found: error

      - name: Agent contract test (strict stderr)
        run: npm run -s test:agent:contract -- --strict-stderr

      - name: Agent golden fixtures
        run: npm run -s test:agent:fixtures
