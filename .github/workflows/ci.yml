name: ci

on:
  push:
  pull_request:

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: DeepThink gates
        run: npm run -s ci:deepthink-gates

      - name: Verify signatures (Tier 1 if present)
        run: npm run -s ci:verify-signatures

      - name: Detect derived tiers
        run: npm run -s ci:detect-tiers

      - name: Notion schema drift gate (skipped)
        if: ${{ secrets.NOTION_TOKEN == '' || secrets.NOTION_AUTOMATION_CONFIG_JSON == '' }}
        run: |
          echo "Notion schema drift gate: skipping (missing NOTION_TOKEN and/or NOTION_AUTOMATION_CONFIG_JSON secrets)."

      - name: Notion schema drift gate (optional; fail-closed)
        if: ${{ secrets.NOTION_TOKEN != '' && secrets.NOTION_AUTOMATION_CONFIG_JSON != '' }}
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_AUTOMATION_CONFIG_JSON: ${{ secrets.NOTION_AUTOMATION_CONFIG_JSON }}
          NOTION_SCHEMA_DRIFT_GATE_PAGE_ID: ${{ secrets.NOTION_SCHEMA_DRIFT_GATE_PAGE_ID }}
        run: |
          set -euo pipefail
          echo "$NOTION_AUTOMATION_CONFIG_JSON" > control/notion-automation-config.json
          if [ -n "${NOTION_SCHEMA_DRIFT_GATE_PAGE_ID:-}" ]; then
            npm run -s notion:gate:doctor
          else
            echo "No NOTION_SCHEMA_DRIFT_GATE_PAGE_ID secret; skipping notion:gate:doctor preflight."
          fi
          npm run -s notion:schema:snapshot
          if [ ! -f scripts/schema-snapshots/notion.schema-baseline.json ]; then
            echo "No baseline file present; skipping drift comparison."
            exit 0
          fi
          npm run -s notion:schema:gate

      - name: Start mock server
        env:
          WEBHOOK_SECRET: test-secret
          MOCK_INCLUDE_THREADID: "1"
          MOCK_PORT: "8787"
        run: |
          node ./scripts/mock-server.js &
          sleep 1
          curl -sSf http://localhost:8787/status/200 >/dev/null

      - name: Smoke vectors (strict)
        env:
          WEBHOOK_SECRET: test-secret
          STRICT_AGENT_OUTPUT: "1"
          VALIDATION_WEBHOOK_URL: http://localhost:8787/validation
          PLANNER_WEBHOOK_URL: http://localhost:8787/planner
          THREAD_ID: local_test_001
        run: npm run smoke:vectors:trim
